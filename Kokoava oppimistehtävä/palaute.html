<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anna palautetta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>

<body>

<!-- Navigaatio -->
<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Travel Explorer</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Etusivu</a></li>
        <li class="nav-item"><a class="nav-link" href="destinations.html">Kohteet</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">Tietoa</a></li>
        <li class="nav-item"><a class="nav-link active" href="palaute.html">Anna palautetta</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="py-5">
  <div class="container">

    <h2 class="text-center mb-4">Anna palautetta</h2>

    <div id="palaute" class="container">

      <form onsubmit="lahetaPalaute(); return false">

        <label for="kokoNimi" class="muoto">Koko nimi:</label>
        <input type="text" id="kokoNimi" class="form-control mb-3" required placeholder="Kirjoita nimesi">

        <label for="email" class="muoto">Sähköpostiosoite:</label>
        <input type="email" id="email" class="form-control mb-3" required placeholder="esimerkki@osoite.com">

        <label for="sisalto" class="muoto">Viestin sisältö:</label>
        <textarea id="sisalto" class="form-control mb-3" placeholder="Kirjoita viestisi tähän..." required></textarea>

        <label for="numero" class="muoto">Puhelinnumero:</label>
        <input type="tel" id="numero" class="form-control mb-3" required placeholder="Syötä puhelinnumerosi">

        <p class="mt-3">Miten koit sivuston?</p>
        <label><input type="radio" name="kokemus" value="Todella hyvä"> Todella hyvä</label><br>
        <label><input type="radio" name="kokemus" value="Ihan ok"> Ihan ok</label><br>
        <label><input type="radio" name="kokemus" value="Parannettavaa löytyy"> Parannettavaa löytyy</label><br>
        <label><input type="radio" name="kokemus" value="Ei vastannut odotuksia"> Ei vastannut odotuksia</label><br>

        <p class="mt-3">Mitä sisältöä toivoisit lisää?</p>
        <label><input type="checkbox" name="toiveet" value="Lisää kuvia"> Lisää kuvia</label><br>
        <label><input type="checkbox" name="toiveet" value="Matkavinkkejä"> Matkavinkkejä</label><br>
        <label><input type="checkbox" name="toiveet" value="Ajankohtaisia uutisia"> Ajankohtaisia uutisia</label><br>
        <label><input type="checkbox" name="toiveet" value="Käyttäjäkokemuksia"> Käyttäjäkokemuksia</label><br>

        <p class="mt-3">Löysitkö etsimäsi tiedon?</p>
        <select id="loytyi" class="form-select mb-3">
          <option value=" "> </option>
          <option value="Kyllä">Kyllä</option>
          <option value="Osittain">Osittain</option>
          <option value="En">En</option>
          <option value="En etsinyt mitään">En etsinyt mitään</option>
        </select>

        <button type="submit" class="btn btn-primary">Lähetä</button>
        <button type="reset" class="btn btn-secondary">Tyhjennä</button>

      </form>

      <div id="vastaus" class="mt-4"></div>

    </div>
  </div>
</section>

<script>
function lahetaPalaute() {

    var nimi = document.getElementById("kokoNimi").value;
    var email = document.getElementById("email").value;
    var sisalto = document.getElementById("sisalto").value;
    var numero = document.getElementById("numero").value;

    var radios = document.getElementsByName("kokemus");
    var kokemus = "";
    for (var i = 0; i < radios.length; i++) {
        if (radios[i].checked) kokemus = radios[i].value;
    }

    var boxit = document.getElementsByName("toiveet");
    var toiveLista = "";
    for (var i = 0; i < boxit.length; i++) {
        if (boxit[i].checked) toiveLista += boxit[i].value + "<br>";
    }

    var loytyi = document.getElementById("loytyi").value;

    document.getElementById("vastaus").innerHTML =
      `<div class="card shadow-sm p-3">
          <h4>Kiitos yhteydenotostasi, ${nimi}!</h4>
          <p><strong>Yhteystiedot:</strong><br>${email}<br>Puhelin: ${numero}</p>
          <p><strong>Viestisi:</strong><br>${sisalto}</p>
          <p><strong>Kokemuksesi sivustosta:</strong> ${kokemus}</p>
          <p><strong>Toivomasi lisäsisältö:</strong><br>${toiveLista}</p>
          <p><strong>Löysitkö etsimäsi:</strong> ${loytyi}</p>
       </div>`;
}
</script>

<footer class="py-4 bg-light text-center">
  <p class="mb-0">© 2026 Travel Explorer</p>
</footer>

</body>
</html>
